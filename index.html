<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AlexRoll</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── Variables & Thèmes ─────────────────────────────────────────── */
:root {
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: .22s cubic-bezier(.4,0,.2,1);

  /* Thème par défaut : Nuit (sombre) */
  --bg:        #0f0f14;
  --bg2:       #18181f;
  --bg3:       #22222c;
  --surface:   #2a2a36;
  --border:    rgba(255,255,255,.08);
  --border2:   rgba(255,255,255,.16);
  --text:      #e8e8f0;
  --text2:     #9090a8;
  --text3:     #5a5a72;
  --accent:    #e8c560;
  --accent2:   #c8a840;
  --accent-bg: rgba(232,197,96,.12);
  --red:       #e05555;
  --green:     #4caf7d;
  --shadow:    0 8px 32px rgba(0,0,0,.5);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.3);
  --glow:      0 0 20px rgba(232,197,96,.15);
}
[data-mode="light"] {
  --bg:        #f5f0e8;
  --bg2:       #ede7d9;
  --bg3:       #e4dccf;
  --surface:   #fff;
  --border:    rgba(0,0,0,.08);
  --border2:   rgba(0,0,0,.16);
  --text:      #1a1a24;
  --text2:     #5a5a72;
  --text3:     #9090a8;
  --accent:    #c09020;
  --accent2:   #a07810;
  --accent-bg: rgba(192,144,32,.1);
  --shadow:    0 8px 32px rgba(0,0,0,.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
  --glow:      none;
}
/* Thèmes couleurs */
[data-theme="or"]    { --accent:#e8c560; --accent2:#c8a840; --accent-bg:rgba(232,197,96,.12); }
[data-theme="jade"]  { --accent:#4ecdc4; --accent2:#38b2aa; --accent-bg:rgba(78,205,196,.12); }
[data-theme="rubis"] { --accent:#e05580; --accent2:#c0356a; --accent-bg:rgba(224,85,128,.12); }
[data-theme="indigo"]{ --accent:#7c6cf0; --accent2:#6055d0; --accent-bg:rgba(124,108,240,.12); }
[data-theme="feu"]   { --accent:#e87840; --accent2:#d06020; --accent-bg:rgba(232,120,64,.12); }

/* ─── Zoom global ────────────────────────────────────────────────── */
html { scroll-behavior:smooth; font-size: var(--zoom-size, 16px); }
[data-zoom="xs"] { --zoom-size: 13px; }
[data-zoom="sm"] { --zoom-size: 14.5px; }
[data-zoom="md"] { --zoom-size: 16px; }
[data-zoom="lg"] { --zoom-size: 18px; }
[data-zoom="xl"] { --zoom-size: 20px; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
h1,h2,h3,h4 { font-family: var(--font-display); font-weight: 700; }

/* ─── Bruit de fond (texture subtile) ───────────────────────────── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
  opacity:.6;
}

/* ─── App shell ──────────────────────────────────────────────────── */
#app { position:relative; z-index:1; min-height:100dvh; display:flex; flex-direction:column; }

/* ─── Header ─────────────────────────────────────────────────────── */
#header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top:0; z-index:100;
}
#header-logo {
  font-family: var(--font-display);
  font-size: 1.35rem; font-weight:900;
  color: var(--accent);
  letter-spacing: -.02em;
  cursor: pointer;
  display:flex; align-items:center; gap:.5rem;
}
#header-logo span { font-size:1.5rem; }
#header-actions { display:flex; align-items:center; gap:.5rem; }
.icon-btn {
  width:38px; height:38px; border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  color:var(--text2); background:var(--bg3); border:1px solid var(--border);
  font-size:1.1rem; transition: all var(--transition);
}
.icon-btn:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-bg); }
#btn-back {
  display:none; align-items:center; gap:.4rem;
  padding:.4rem .8rem; border-radius:var(--radius-sm);
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); font-size:.85rem; transition:all var(--transition);
}
#btn-back:hover { color:var(--text); border-color:var(--border2); }
#btn-back.visible { display:flex; }

/* ─── Pages ──────────────────────────────────────────────────────── */
.page { display:none; flex:1; }
.page.active { display:flex; flex-direction:column; }

/* ─── Page Catalogue ─────────────────────────────────────────────── */
#page-catalogue { padding:1.5rem 1.25rem 2rem; gap:1.5rem; }
.catalogue-hero {
  text-align:center; padding:1rem 0 .5rem;
}
.catalogue-hero h2 {
  font-size:clamp(1.6rem,5vw,2.4rem); font-weight:900;
  background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1; margin-bottom:.5rem;
}
.catalogue-hero p { color:var(--text2); font-size:.9rem; }
.catalogue-filters {
  display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center;
}
.filter-btn {
  padding:.4rem .9rem; border-radius:99px;
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text2); font-size:.82rem; transition:all var(--transition);
}
.filter-btn.active, .filter-btn:hover {
  background:var(--accent-bg); border-color:var(--accent); color:var(--accent);
}
.games-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap:1rem;
}
.game-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:1.25rem;
  cursor:pointer; transition:all var(--transition);
  position:relative; overflow:hidden;
}
.game-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--accent); transform:scaleX(0); transform-origin:left;
  transition:transform var(--transition);
}
.game-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:var(--shadow); }
.game-card:hover::before { transform:scaleX(1); }
.game-card-emoji { font-size:2.2rem; margin-bottom:.75rem; display:block; }
.game-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; margin-bottom:.5rem; }
.game-card-title { font-family:var(--font-display); font-size:1.2rem; font-weight:700; }
.game-card-badge {
  font-size:.7rem; padding:.2rem .55rem; border-radius:99px;
  background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent);
  white-space:nowrap; flex-shrink:0; font-weight:500;
}
.game-card-desc { color:var(--text2); font-size:.85rem; line-height:1.5; margin-bottom:.9rem; }
.game-card-meta { display:flex; gap:.75rem; font-size:.78rem; color:var(--text3); }
.game-card-meta span { display:flex; align-items:center; gap:.25rem; }
.game-card-cta {
  margin-top:1rem; padding:.6rem 1rem; border-radius:var(--radius-sm);
  background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent);
  font-size:.82rem; font-weight:500; width:100%;
  transition:all var(--transition);
}
.game-card-cta:hover { background:var(--accent); color:var(--bg); }

/* ─── Page Fiche jeu ─────────────────────────────────────────────── */
#page-fiche { overflow-y:auto; }
.fiche-container { max-width:760px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
.fiche-header { margin-bottom:1.5rem; }
.fiche-emoji { font-size:3rem; margin-bottom:.75rem; display:block; }
.fiche-title { font-size:clamp(1.8rem,6vw,2.6rem); font-weight:900; margin-bottom:.4rem; }
.fiche-desc { color:var(--text2); font-size:.95rem; margin-bottom:1rem; }
.fiche-meta { display:flex; flex-wrap:wrap; gap:.5rem; }
.fiche-tag {
  padding:.3rem .7rem; border-radius:99px; font-size:.78rem;
  background:var(--bg3); border:1px solid var(--border); color:var(--text2);
}
.fiche-section { margin:1.5rem 0; }
.fiche-section-title {
  font-size:.7rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase;
  color:var(--accent); margin-bottom:.75rem; padding-bottom:.4rem;
  border-bottom:1px solid var(--border);
}
.regles-content {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:1.25rem;
  color:var(--text2); font-size:.9rem; line-height:1.7;
}
.regles-content h3 { font-family:var(--font-display); color:var(--text); margin:1rem 0 .4rem; font-size:1rem; }
.regles-content h3:first-child { margin-top:0; }
.regles-content ol, .regles-content ul { padding-left:1.2rem; margin:.5rem 0; }
.regles-content li { margin:.3rem 0; }
.regles-content p { margin:.4rem 0; }
.regles-content strong { color:var(--text); }

/* Bouton jouer */
.btn-jouer {
  display:flex; align-items:center; justify-content:center; gap:.6rem;
  width:100%; padding:1rem; border-radius:var(--radius);
  background:var(--accent); color:var(--bg); font-size:1rem; font-weight:500;
  font-family:var(--font-display); letter-spacing:.02em;
  transition:all var(--transition); box-shadow:var(--glow);
}
.btn-jouer:hover { transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 8px 24px rgba(232,197,96,.25); }
.btn-jouer:active { transform:translateY(0); }

/* ─── Page Setup joueurs ─────────────────────────────────────────── */
#page-setup { overflow-y:auto; }
.setup-container { max-width:600px; margin:0 auto; padding:1.5rem 1.25rem 3rem; gap:1.5rem; display:flex; flex-direction:column; }
.setup-title { font-size:1.5rem; }
.joueurs-list { display:flex; flex-direction:column; gap:.6rem; }
.joueur-item {
  display:flex; align-items:center; gap:.75rem;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:.6rem .75rem;
  transition:border-color var(--transition);
}
.joueur-item:focus-within { border-color:var(--accent); }
.joueur-avatar {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; font-weight:700; font-family:var(--font-display);
  background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent);
  cursor:pointer; transition:all var(--transition);
}
.joueur-avatar:hover { filter:brightness(1.1); }
.joueur-input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:var(--font-body); font-size:.95rem;
}
.joueur-input::placeholder { color:var(--text3); }
.joueur-del {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  color:var(--text3); transition:all var(--transition);
}
.joueur-del:hover { color:var(--red); background:rgba(224,85,85,.1); }
.btn-ajouter {
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  padding:.7rem; border-radius:var(--radius-sm);
  border:1px dashed var(--border2); color:var(--text3);
  font-size:.88rem; transition:all var(--transition);
}
.btn-ajouter:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
.setup-actions { display:flex; flex-direction:column; gap:.75rem; }
.btn-primary {
  padding:.85rem; border-radius:var(--radius);
  background:var(--accent); color:var(--bg);
  font-size:1rem; font-weight:500; font-family:var(--font-display);
  transition:all var(--transition);
}
.btn-primary:hover:not(:disabled) { filter:brightness(1.08); transform:translateY(-1px); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }

/* ─── Page Jeu ───────────────────────────────────────────────────── */
#page-jeu { overflow-y:auto; }
.jeu-container { max-width:800px; margin:0 auto; padding:1rem 1rem 3rem; display:flex; flex-direction:column; gap:1rem; }

/* Tableau de score générique */
.score-table-wrap { overflow-x:auto; }
.score-table {
  width:100%; border-collapse:collapse; font-size:.85rem;
  background:var(--bg2); border-radius:var(--radius); overflow:hidden;
}
.score-table th {
  padding:.6rem .8rem; text-align:center;
  background:var(--bg3); color:var(--text2); font-weight:500; font-size:.78rem;
  border-bottom:1px solid var(--border);
}
.score-table th.active-col { color:var(--accent); background:var(--accent-bg); }
.score-table td {
  padding:.55rem .8rem; text-align:center;
  border-bottom:1px solid var(--border);
}
.score-table tr:last-child td { border-bottom:none; }
.score-table .ligne-label { text-align:left; color:var(--text2); font-size:.82rem; }
.score-table .section-header td {
  background:var(--bg3); color:var(--accent); font-size:.72rem;
  text-transform:uppercase; letter-spacing:.1em; font-weight:500;
  padding:.4rem .8rem; text-align:left;
}
.score-cell { position:relative; }
.score-cell.filled { color:var(--text); font-weight:500; }
.score-cell.possible {
  color:var(--accent); cursor:pointer; transition:background var(--transition);
}
.score-cell.possible:hover { background:var(--accent-bg); }
.score-cell.zeroed { color:var(--text3); }
.total-row td { font-weight:600; background:var(--bg3); }
.total-row td.winner { color:var(--accent); }
.bonus-row td { font-size:.78rem; color:var(--green); }

/* ─── Composant Dés ──────────────────────────────────────────────── */
.des-zone {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:1.25rem;
}
.des-titre { font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); margin-bottom:.9rem; }
.des-grid { display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap; }
.de {
  width:90px; height:90px; border-radius:16px;   /* ← taille des dés : changer ici */
  background:var(--surface); border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:4.2rem; font-weight:500; /* ← taille de la face */
  cursor:pointer; transition:all var(--transition);
  user-select:none; position:relative;
}
.de:hover { border-color:var(--accent); }
.de.garde {
  background:var(--accent-bg); border-color:var(--accent); color:var(--accent);
  box-shadow:0 0 16px rgba(232,197,96,.25);
}
.de.garde::after {
  content:'✓'; position:absolute; top:-8px; right:-8px;
  width:22px; height:22px; border-radius:50%;
  background:var(--accent); color:var(--bg);
  font-size:.7rem; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-body);
}
.de.unrolled { color:var(--text3); border-style:dashed; font-family:var(--font-body); font-size:2.2rem; cursor:default; }
.de.unrolled:hover { border-color:var(--border2); }
.de.roll-anim { animation:rollDe .3s ease; }
@keyframes rollDe { 0%{transform:scale(.8) rotate(-10deg);} 60%{transform:scale(1.1) rotate(5deg);} 100%{transform:scale(1) rotate(0);} }
.des-actions { display:flex; gap:.75rem; align-items:center; margin-top:1rem; flex-wrap:wrap; }
.btn-lancer {
  flex:1; min-width:140px; padding:.75rem 1rem; border-radius:var(--radius-sm);
  background:var(--accent); color:var(--bg); font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  transition:all var(--transition);
}
.btn-lancer:hover:not(:disabled) { filter:brightness(1.08); }
.btn-lancer:disabled { opacity:.4; cursor:not-allowed; }
.lances-restants { font-size:.82rem; color:var(--text2); }
.lances-dots { display:flex; gap:4px; }
.lances-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent); transition:all var(--transition);
}
.lances-dot.used { background:var(--text3); }

/* ─── Composant Cartes ───────────────────────────────────────────── */
.carte {
  display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
  width:56px; height:80px; border-radius:8px;
  background:var(--surface); border:1.5px solid var(--border2);
  font-family:var(--font-display); font-size:1.2rem; font-weight:700;
  position:relative; transition:all var(--transition);
}
.carte.rouge { color:#e05555; }
.carte.noir { color:var(--text); }
.carte-val { font-size:1rem; line-height:1; }
.carte-couleur { font-size:1.4rem; line-height:1; }
.carte-dos {
  background:linear-gradient(135deg, var(--bg3) 0%, var(--surface) 100%);
  border-color:var(--accent);
}
.carte-dos::after {
  content:''; position:absolute; inset:4px; border-radius:4px;
  border:1px solid var(--border);
}

/* ─── Info joueur actuel ─────────────────────────────────────────── */
.joueur-actuel-bar {
  display:flex; align-items:center; gap:.75rem;
  background:var(--accent-bg); border:1px solid var(--accent);
  border-radius:var(--radius-sm); padding:.6rem 1rem;
}
.joueur-actuel-avatar {
  width:32px; height:32px; border-radius:50%;
  background:var(--accent); color:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:.9rem; flex-shrink:0;
  font-family:var(--font-display);
}
.joueur-actuel-info { flex:1; }
.joueur-actuel-label { font-size:.7rem; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; }
.joueur-actuel-nom { font-size:.95rem; font-weight:500; }
.tour-info { font-size:.8rem; color:var(--text2); }

/* ─── Jetons (421) ───────────────────────────────────────────────── */
.jetons-grid { display:flex; flex-wrap:wrap; gap:.75rem; }
.jeton-joueur {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:.75rem 1rem;
  min-width:120px; text-align:center;
  transition:all var(--transition);
}
.jeton-joueur.actif { border-color:var(--accent); background:var(--accent-bg); }
.jeton-joueur.eliminated { opacity:.4; }
.jeton-nom { font-size:.8rem; color:var(--text2); margin-bottom:.4rem; }
.jeton-count { font-size:1.5rem; font-weight:700; font-family:var(--font-display); color:var(--accent); }
.jeton-icons { display:flex; flex-wrap:wrap; gap:3px; justify-content:center; margin-top:.4rem; }
.jeton-icon { width:10px; height:10px; border-radius:50%; background:var(--accent); display:inline-block; }

/* ─── Résultat / Victoire ────────────────────────────────────────── */
.fin-overlay {
  text-align:center; padding:2rem 1.25rem;
  background:var(--bg2); border:1px solid var(--accent);
  border-radius:var(--radius); margin:1rem;
}
.fin-emoji { font-size:3rem; margin-bottom:.75rem; }
.fin-title { font-size:1.8rem; margin-bottom:.5rem; color:var(--accent); }
.fin-subtitle { color:var(--text2); margin-bottom:1.5rem; }
.btn-rejouer {
  padding:.8rem 2rem; border-radius:var(--radius);
  background:var(--accent); color:var(--bg);
  font-size:1rem; font-weight:500; font-family:var(--font-display);
  transition:all var(--transition); display:inline-block;
}
.btn-rejouer:hover { filter:brightness(1.08); }

/* ─── Scores ChoupiSteak ─────────────────────────────────────────── */
.scores-cs-grid{display:flex;flex-direction:column;gap:.45rem;}
.score-cs-row{display:grid;grid-template-columns:minmax(80px,1fr) 2fr minmax(42px,auto);align-items:center;gap:.55rem;padding:.3rem .4rem;border-radius:var(--radius-sm);transition:background var(--transition);}
.score-cs-row.actif{background:var(--accent-bg);}
.score-cs-joueur{font-size:.82rem;display:flex;align-items:center;gap:.3rem;overflow:hidden;}
.score-cs-joueur span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-cs-bar-wrap{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.score-cs-bar{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);min-width:2px;}
.score-cs-val{font-size:.85rem;font-weight:600;font-family:var(--font-display);text-align:right;}

<script>
// ─── Service Worker — enregistrement & mise à jour auto ──────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        // Vérifier les mises à jour toutes les 60 secondes
        setInterval(() => reg.update(), 60000);

        // Un nouveau SW est en attente d'activation
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Nouvelle version prête — afficher la bannière
              afficherBannereMaj();
            }
          });
        });
      })
      .catch(err => console.warn('SW:', err));

    // Quand le SW prend le contrôle (après skipWaiting), recharger la page
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  });
}

function afficherBannereMaj() {
  const banner = document.getElementById('update-banner');
  banner.style.display = 'flex';
  // Animation d'entrée
  banner.animate([
    { opacity: 0, transform: 'translateX(-50%) translateY(20px)' },
    { opacity: 1, transform: 'translateX(-50%) translateY(0)' }
  ], { duration: 300, easing: 'ease', fill: 'forwards' });
}

window.appliquerMiseAJour = function() {
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage('skipWaiting');
  } else {
    window.location.reload();
  }
};
</script>

function _countDes(des){ return des.reduce((a,d)=>{a[d]=(a[d]||0)+1;return a;},{}); }
function _hasSeq(sorted,len){ let s=1; for(let i=1;i<sorted.length;i++){s=sorted[i]===sorted[i-1]+1?s+1:1;if(s>=len)return true;} return false; }

const MODULES = {

yams: {
  id:'yams', nom:'Yams', emoji:'🎲', type:'dés', joueursMin:2, joueursMax:6,

  scoreConfig:{
    sections:[
      {titre:'Combinaisons hautes',lignes:[
        {id:'as',    label:'As',    hint:'somme des 1', calc:d=>d.filter(x=>x===1).reduce((a,b)=>a+b,0)},
        {id:'deux',  label:'Deux',  hint:'somme des 2', calc:d=>d.filter(x=>x===2).reduce((a,b)=>a+b,0)},
        {id:'trois', label:'Trois', hint:'somme des 3', calc:d=>d.filter(x=>x===3).reduce((a,b)=>a+b,0)},
        {id:'quatre',label:'Quatre',hint:'somme des 4', calc:d=>d.filter(x=>x===4).reduce((a,b)=>a+b,0)},
        {id:'cinq',  label:'Cinq',  hint:'somme des 5', calc:d=>d.filter(x=>x===5).reduce((a,b)=>a+b,0)},
        {id:'six',   label:'Six',   hint:'somme des 6', calc:d=>d.filter(x=>x===6).reduce((a,b)=>a+b,0)},
      ]},
      {titre:'Combinaisons basses',lignes:[
        {id:'brelan',      label:'Brelan',      hint:'3 identiques',      calc:d=>{const c=_countDes(d);return Object.values(c).some(v=>v>=3)?Object.keys(c).filter(k=>c[k]>=3).reduce((a,k)=>a+parseInt(k)*c[k],0):0;}},
        {id:'carre',       label:'Carré',       hint:'4 identiques',      calc:d=>{const c=_countDes(d);const k=Object.keys(c).find(k=>c[k]>=4);return k?parseInt(k)*4:0;}},
        {id:'full',        label:'Full',        hint:'brelan+paire = 25', calc:d=>{const c=_countDes(d);const v=Object.values(c);return(v.includes(3)&&v.includes(2))||v.includes(5)?25:0;}},
        {id:'petite_suite',label:'Petite suite',hint:'4 consécutifs = 30',calc:d=>{const u=[...new Set(d)].sort((a,b)=>a-b);return _hasSeq(u,4)?30:0;}},
        {id:'grande_suite',label:'Grande suite',hint:'5 consécutifs = 40',calc:d=>{const u=[...new Set(d)].sort((a,b)=>a-b);return _hasSeq(u,5)?40:0;}},
        {id:'yams',        label:'Yams',        hint:'5 identiques = 50', calc:d=>{const c=_countDes(d);return Object.values(c).some(v=>v>=5)?50:0;}},
        {id:'chance',      label:'Chance',      hint:'somme totale',      calc:d=>d.reduce((a,b)=>a+b,0)},

  state:null,

    this.state={joueurs:joueurs.map(j=>({...j,scores:{},total:0,sousTotal:0,bonus:0})),joueurActuel:0,des:[1,1,1,1,1],desGardes:[false,false,false,false,false],lancesRestants:3,phase:'lancer',manche:1,manchesTotal:13};

'421': {

  scoreConfig:null,

    state.tourScores.push({joueurIdx:state.joueurActuel,score,label,des:[...state.des]});
    state.joueurActuel=(state.joueurActuel+1)%state.joueurs.length;
    state.des=[1,1,1];state.desGardes=[false,false,false];state.lancesRestants=3;state.phase='lancer';
    if(state.tourScores.length===state.joueurs.length)state.phase='resultat_tour';
    return{...state};
  },
  appliquerResultatTour(state){
    const perdant=state.tourScores.reduce((min,s)=>s.score<min.score?s:min,state.tourScores[0]);
    const is421=perdant.score===1000;const penalite=is421?3:1;
    state.joueurs[perdant.joueurIdx].jetons=Math.max(0,state.joueurs[perdant.joueurIdx].jetons-penalite);
    state.pot+=penalite;
    if(state.pot>=5){state.joueurs[perdant.joueurIdx].jetons+=state.pot;state.pot=0;}
    state.tourScores=[];state.phase='lancer';
    const actifs=state.joueurs.filter(j=>j.jetons>0).length;
    if(actifs<=1)state.phase='fin';
    return{...state};
  }
},

bataille: {
  id:'bataille', nom:'Bataille', emoji:'🃏', type:'cartes', joueursMin:2, joueursMax:4,
  description:'Le classique ! Distribuez toutes les cartes et retournez-les une à une.',
  regles:`<h3>But du jeu</h3><p>Remporter toutes les cartes du jeu.</p><h3>Mise en place</h3><p>Le jeu de 52 cartes est distribué équitablement entre les joueurs, faces cachées.</p><h3>Déroulement</h3><ol><li>Chaque joueur retourne simultanément sa carte du dessus.</li><li>La carte la plus haute remporte toutes les cartes jouées.</li><li>En cas d'égalité : <strong>bataille !</strong> Chaque joueur place 3 cartes faces cachées, puis une 4e face visible. La plus haute de ces dernières gagne tout.</li></ol><h3>Valeurs des cartes</h3><p>As (14) › Roi (13) › Dame (12) › Valet (11) › 10 › 9 › ... › 2</p><h3>Fin de partie</h3><p>Un joueur sans carte est éliminé. Le dernier en jeu a gagné.</p>`,
  scoreConfig:null,
  VALEURS:['2','3','4','5','6','7','8','9','10','V','D','R','A'],
  COULEURS:['♠','♥','♦','♣'],
  creerDeck(){
    const deck=[];
    for(const c of this.COULEURS)for(let v=0;v<this.VALEURS.length;v++)deck.push({valeur:this.VALEURS[v],couleur:c,force:v+2,rouge:c==='♥'||c==='♦'});
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
    return deck;
  },
  init(joueurs){
    const deck=this.creerDeck();const nb=joueurs.length;
    const mains=joueurs.map((_,i)=>deck.filter((_,idx)=>idx%nb===i));
    this.state={joueurs:joueurs.map((j,i)=>({...j,main:mains[i],cartesGagnees:[]})),cartesTable:[],cartesCachees:[],phase:'jouer',message:'',tour:1};
    return this.state;
  },
  jouerTour(state){
    const actifs=state.joueurs.filter(j=>j.main.length>0);
    if(actifs.length<2){state.phase='fin';return{...state};}
    state.cartesTable=actifs.map(j=>({joueurId:j.id,carte:j.main.shift()}));
    state.phase='resultat';state.tour++;
    const maxForce=Math.max(...state.cartesTable.map(c=>c.carte.force));
    const gagnants=state.cartesTable.filter(c=>c.carte.force===maxForce);
    if(gagnants.length===1){
      const gagnant=state.joueurs.find(j=>j.id===gagnants[0].joueurId);
      const cartes=[...state.cartesCachees,...state.cartesTable.map(c=>c.carte)];
      for(let i=cartes.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cartes[i],cartes[j]]=[cartes[j],cartes[i]];}
      gagnant.main.push(...cartes);state.cartesCachees=[];
      state.message=`${gagnant.nom} remporte le pli !`;
    }else{
      state.phase='bataille';state.message='Bataille !';
      const cacheesNouv=state.cartesTable.map(c=>c.carte);
      for(const g of gagnants){const j=state.joueurs.find(jj=>jj.id===g.joueurId);cacheesNouv.push(...j.main.splice(0,Math.min(3,j.main.length)));}
      state.cartesCachees=[...state.cartesCachees,...cacheesNouv];
    }
    return{...state};
  },
  continuer(state){
    state.cartesTable=[];
    const actifs=state.joueurs.filter(j=>j.main.length>0);
    state.phase=actifs.length<2?'fin':'jouer';
    return{...state};
  }
},

choupisteak: {
  id:'choupisteak', nom:'ChoupiSteak', emoji:'🥩', type:'dés', joueursMin:2, joueursMax:6,
  description:'Réalisez des combinaisons avec 4 dés en 3 lancers. Les carrés de 1/2/3 pénalisent vos adversaires !',
  regles:`<h3>But du jeu</h3><p>Accumuler des points tour par tour. Dès qu'un joueur atteint 600 pts, chacun joue un dernier tour — le score le plus haut l'emporte !</p><h3>Déroulement d'un tour</h3><ol><li>Lancez les 4 dés (1<sup>er</sup> lancer obligatoire).</li><li>Cliquez les dés à conserver, relancez les autres (2 relances max).</li><li>Validez quand vous êtes satisfait de votre combinaison.</li></ol><h3>Combinaisons</h3><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.83rem;margin:.5rem 0;text-align:center"><thead><tr><th style="text-align:left;padding:.35rem .5rem"></th><th style="color:var(--accent)">×1</th><th style="color:var(--accent)">×2</th><th style="color:var(--accent)">×3</th><th style="color:var(--accent)">×4</th><th style="color:var(--accent)">×5</th><th style="color:var(--accent)">×6</th></tr></thead><tbody><tr><td style="text-align:left;padding:.3rem .5rem;color:var(--text2)">Doubles</td><td>5</td><td>10</td><td>15</td><td>20</td><td>25</td><td>30</td></tr><tr><td style="text-align:left;padding:.3rem .5rem;color:var(--text2)">Triples</td><td>10</td><td>20</td><td>30</td><td>40</td><td>50</td><td>60</td></tr><tr><td style="text-align:left;padding:.3rem .5rem;color:var(--text2)">Carrés</td><td style="font-size:.78rem">+100<br><span style="color:var(--red)">−100</span></td><td style="font-size:.78rem">+50<br><span style="color:var(--red)">−50</span></td><td style="font-size:.78rem">+70<br><span style="color:var(--red)">−30</span></td><td>100</td><td>125</td><td>150</td></tr><tr><td style="text-align:left;padding:.3rem .5rem;color:var(--text2)">Suites</td><td colspan="3" style="color:var(--text3)">—</td><td>60</td><td>75</td><td>90</td></tr></tbody></table></div><h3>Règles spéciales</h3><ul><li>Deux doubles se <strong>cumulent</strong> (ex. paire de 2 + paire de 3 = 25 pts).</li><li>Les carrés de 1, 2 et 3 <strong>retirent des points</strong> à chaque adversaire.</li><li>Carré de 1 en un seul lancer = <strong>victoire instantanée !</strong></li><li>À 6 joueurs ou plus, la victoire est atteinte à <strong>360 pts</strong>.</li></ul><p style="font-size:.78rem;color:var(--text3);margin-top:1rem">Jeu inventé par Alexandre Rech</p>`,
  scoreConfig:null,
  state:null,

  init(joueurs){
    const seuil=joueurs.length>=6?360:600;
    this.state={
      joueurs:joueurs.map(j=>({...j,score:0})),
      joueurActuel:0,
      des:[1,1,1,1],
      desGardes:[false,false,false,false],
      lancesRestants:3,
      phase:'lancer',
      scoreActuel:null,
      seuil,
      mancheFinale:false,
      joueurDeclencheur:-1,
      gagnant:null,
      victoireInstantanee:false
    };
    return this.state;
  },

  calculerScore(des){
    const counts={};
    for(let i=1;i<=6;i++) counts[i]=des.filter(d=>d===i).length;
    // Instant win: carré de 1
    if(counts[1]===4) return{points:100,penalite:100,penaliteLabel:'−100',label:'🎲🎲🎲🎲 Carré de 1 → +100',instantWin:true};
    let points=0,penalite=0,penaliteLabel='';
    const labels=[];
    // Suite : 4 valeurs distinctes consécutives
    const uniq=[...new Set(des)].sort((a,b)=>a-b);
    if(uniq.length===4&&uniq[3]-uniq[0]===3){
      const h=uniq[3];
      if(h===4){points=60;labels.push('Suite 1-2-3-4 → 60 pts');}
      else if(h===5){points=75;labels.push('Suite 2-3-4-5 → 75 pts');}
      else if(h===6){points=90;labels.push('Suite 3-4-5-6 → 90 pts');}
      return{points,penalite,penaliteLabel,label:labels[0]||'Suite',instantWin:false};
    }
    // Paires, triples, carrés (boucle pour cumuler les 2 paires)
    for(let v=1;v<=6;v++){
      const cnt=counts[v];
      if(cnt===2){const pts=5*v;points+=pts;labels.push(`Paire de ${v} → ${pts} pts`);}
      else if(cnt===3){const pts=10*v;points+=pts;labels.push(`Triple de ${v} → ${pts} pts`);}
      else if(cnt===4){
        if(v===2){points=50;penalite=50;penaliteLabel='−50';labels.push('Carré de 2 → +50 pts');}
        else if(v===3){points=70;penalite=30;penaliteLabel='−30';labels.push('Carré de 3 → +70 pts');}
        else if(v===4){points=100;labels.push('Carré de 4 → 100 pts');}
        else if(v===5){points=125;labels.push('Carré de 5 → 125 pts');}
        else if(v===6){points=150;labels.push('Carré de 6 → 150 pts');}
      }
    }
    return{points,penalite,penaliteLabel,label:labels.length?labels.join(' + '):'Aucune combinaison → 0 pt',instantWin:false};
  },

  lancerDes(state){
    if(state.lancesRestants<=0)return state;
    state.des=state.des.map((d,i)=>state.desGardes[i]?d:Math.ceil(Math.random()*6));
    state.lancesRestants--;
    const sc=this.calculerScore(state.des);
    state.scoreActuel=sc;
    if(sc.instantWin){
      const joueur=state.joueurs[state.joueurActuel];
      joueur.score+=sc.points;
      state.joueurs.forEach((j,i)=>{if(i!==state.joueurActuel)j.score-=sc.penalite;});
      state.gagnant=joueur;
      state.victoireInstantanee=true;
      state.phase='fin';
      return{...state};
    }
    state.phase='scorer';
    return{...state};
  },

  toggleGarde(state,idx){
    if(state.phase!=='scorer'||state.lancesRestants<=0)return state;
    state.desGardes[idx]=!state.desGardes[idx];
    return{...state};
  },

  validerTour(state){
    const sc=state.scoreActuel;
    if(!sc||state.phase!=='scorer')return state;
    const joueur=state.joueurs[state.joueurActuel];
    joueur.score+=sc.points;
    if(sc.penalite>0) state.joueurs.forEach((j,i)=>{if(i!==state.joueurActuel)j.score-=sc.penalite;});
    // Déclenchement fin de manche
    if(joueur.score>=state.seuil&&!state.mancheFinale){
      state.mancheFinale=true;
      state.joueurDeclencheur=state.joueurActuel;
    }
    const nextIdx=(state.joueurActuel+1)%state.joueurs.length;
    // Fin de manche : tout le monde a joué son dernier tour
    if(state.mancheFinale&&nextIdx===state.joueurDeclencheur){
      const au_seuil=state.joueurs.filter(j=>j.score>=state.seuil);
      if(au_seuil.length===0){
        // Les pénalités ont tout effacé → on continue
        state.mancheFinale=false;state.joueurDeclencheur=-1;
      } else {
        state.phase='fin';
        state.gagnant=au_seuil.reduce((max,j)=>j.score>max.score?j:max,au_seuil[0]);
        state.joueurActuel=nextIdx;
        return{...state};
      }
    }
    state.joueurActuel=nextIdx;
    state.des=[1,1,1,1];state.desGardes=[false,false,false,false];
    state.lancesRestants=3;state.phase='lancer';state.scoreActuel=null;
    return{...state};
  }
}

            <tr class="section-header"><td colspan="${s.joueurs.length+1}">${section.titre}</td></tr>
            ${section.lignes.map(ligne => `
              <tr>
                <td class="ligne-label" title="${ligne.hint}">${ligne.label}</td>
                ${s.joueurs.map((j,ji) => {
                  const filled = j.scores[ligne.id] !== undefined;
                  const possible = !filled && ji===s.joueurActuel && s.phase==='scorer';
                  const pv = possible ? m.getScorePossible(s, ligne.id) : 0;
                  return `<td class="score-cell${filled?' filled':possible&&pv>0?' possible':possible?' zeroed':''}"
                    ${possible?`onclick="inscrireYams('${ligne.id}')" title="Inscrire ${pv} pts"`:''}
                  >${filled?j.scores[ligne.id]:possible&&pv>0?`<span style="opacity:.7">${pv}</span>`:filled?j.scores[ligne.id]:''}</td>`;
                }).join('')}
              </tr>
            `).join('')}
          `).join('')}
          <tr class="bonus-row">
            <td class="ligne-label">Bonus (≥63)</td>
            ${s.joueurs.map(j => `<td>${j.bonus>0?'+'+j.bonus:'-'}</td>`).join('')}
          </tr>
          <tr class="total-row">
            <td class="ligne-label">Total</td>
            ${s.joueurs.map((j,i) => {
              const isMax = j.total===Math.max(...s.joueurs.map(jj=>jj.total));
              return `<td class="${isMax&&j.total>0?'winner':''}" style="color:${j.couleur}">${j.total}</td>`;
            }).join('')}
          </tr>
        </tbody>
      </table>
    </div>
    ${s.phase==='lancer'?`<p style="color:var(--text3);font-size:.82rem;text-align:center">Lancez les dés pour commencer votre tour</p>`:''}
  `;
}

      <div class="joueur-actuel-info">

          `).join('')}
        </div>
      ` : ''}
      ${state.jeuId==='choupisteak' ? `
        <div style="margin:1rem auto;text-align:left;max-width:300px">
          ${[...s.joueurs].sort((a,b)=>b.score-a.score).map((j,i)=>`
            <div style="display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
              <span style="font-size:1.1rem">${['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'][i]||''}</span>

// ─── Sauvegarde des parties ───────────────────────────────────────
function _serializeState(s) {
  // Les fonctions calc() ne sont pas sérialisables — on ne stocke que les données pures
  try { return JSON.stringify(s); } catch(e) { return null; }
}

window.sauvegarderPartie = function() {
  if (!state.jeuState || !state.partieId || state.jeuState.phase === 'fin') return;
  const parties = _getParties();
  const joueurs = state.jeuState.joueurs || [];
  const nomJoueurs = joueurs.map(j=>j.nom).join(', ');
  const serialized = _serializeState(state.jeuState);
  if (!serialized) return;
  parties[state.partieId] = {
    id:       state.partieId,
    jeuId:    state.jeuId,
    nom:      `${state.module.emoji} ${state.module.nom} — ${nomJoueurs}`,
    date:     Date.now(),
    jeuState: serialized,
    joueurs:  JSON.stringify(state.jeuState.joueurs.map(j=>({id:j.id,nom:j.nom,avatar:j.avatar,couleur:j.couleur}))),
  };
  localStorage.setItem('ar-parties', JSON.stringify(parties));
};

function _getParties() {
  try { return JSON.parse(localStorage.getItem('ar-parties') || '{}'); } catch(e) { return {}; }
}

function _dateRelative(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000)   return 'À l\'instant';
  if (diff < 3600000) return `Il y a ${Math.floor(diff/60000)} min`;
  if (diff < 86400000)return `Il y a ${Math.floor(diff/3600000)} h`;
  return new Date(ts).toLocaleDateString('fr-FR', {day:'numeric',month:'short'});
}

function renderPartiesSauvegardees() {
  const parties = _getParties();
  const liste   = Object.values(parties).sort((a,b) => b.date - a.date);
  const section = document.getElementById('parties-section');
  const list    = document.getElementById('parties-list');
  if (!section || !list) return;
  if (liste.length === 0) { section.style.display='none'; return; }
  section.style.display = 'block';
  list.innerHTML = liste.map(p => `
    <div class="partie-card">
      <div class="partie-card-info" onclick="reprendrePartie('${p.id}')">
        <div class="partie-card-titre">${p.nom}</div>
        <div class="partie-card-meta">${_dateRelative(p.date)}</div>
      </div>
      <div class="partie-card-actions">
        <button class="partie-btn-continuer" onclick="reprendrePartie('${p.id}')">▶ Continuer</button>
        <button class="partie-btn-del" onclick="supprimerPartie('${p.id}',event)" title="Supprimer">✕</button>
      </div>
    </div>
  `).join('');
}

window.reprendrePartie = function(id) {
  const parties = _getParties();
  const p = parties[id];
  if (!p) return;
  state.module  = loadModule(p.jeuId);
  state.jeuId   = p.jeuId;
  state.partieId = p.id;
  // Restaurer le jeuState (sans les fonctions calc, on les réattache via le module)
  try {
    state.jeuState = JSON.parse(p.jeuState);
  } catch(e) { toast('Erreur de chargement'); return; }
  goTo('jeu', p.jeuId);
  renderJeu();
};

window.supprimerPartie = function(id, e) {
  e.stopPropagation();
  const parties = _getParties();
  delete parties[id];
  localStorage.setItem('ar-parties', JSON.stringify(parties));
  renderPartiesSauvegardees();
};

// Sauvegarde auto toutes les 30s quand une partie est en cours
setInterval(() => { if (state.page==='jeu') sauvegarderPartie(); }, 30000);

// ─── Panel Règles en jeu ──────────────────────────────────────────
window.ouvrirReglesPanel = function() {
  const panel = document.getElementById('regles-panel');
  document.getElementById('regles-panel-titre').textContent =
    `${state.module?.emoji||''} Règles — ${state.module?.nom||''}`;
  document.getElementById('regles-panel-content').innerHTML =
    state.module?.regles || '';
  // Bouton reprendre visible si partie en cours
  const btnReprendre = document.getElementById('btn-reprendre-partie');
  btnReprendre.style.display = state.jeuState && state.jeuState.phase !== 'fin' ? 'flex' : 'none';
  panel.classList.add('open');
  panel.scrollTop = 0;
};

window.fermerReglesPanel = function() {
  document.getElementById('regles-panel').classList.remove('open');
};

// Aussi accessible depuis la fiche jeu sans partie en cours
window.ouvrirReglesFiche = function(id) {
  state.module = loadModule(id);
  ouvrirReglesPanel();
};

// ─── Toast ────────────────────────────────────────────────────────
let toastTimer;
window.toast = function(msg, duration=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), duration);
};

// ─── Thème & Mode ─────────────────────────────────────────────────
window.openThemeModal = function() {
  document.getElementById('theme-modal').classList.add('open');
};
window.closeThemeModal = function(e) {
  if(e.target.id==='theme-modal') document.getElementById('theme-modal').classList.remove('open');
};
window.setTheme = function(theme) {
  document.body.dataset.theme = theme;
  document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.toggle('active',s.dataset.theme===theme));
  localStorage.setItem('ar-theme', theme);
};
window.setMode = function(mode) {
  document.body.dataset.mode = mode;
  document.getElementById('mode-dark-btn').classList.toggle('active', mode==='dark');
  document.getElementById('mode-light-btn').classList.toggle('active', mode==='light');
  localStorage.setItem('ar-mode', mode);
};

window.setZoom = function(zoom) {
  document.documentElement.dataset.zoom = zoom;
  document.querySelectorAll('.zoom-btn').forEach(b => b.classList.toggle('active', b.dataset.zoom===zoom));
  localStorage.setItem('ar-zoom', zoom);
};

// ─── Init ─────────────────────────────────────────────────────────
(function init() {
  const theme = localStorage.getItem('ar-theme') || 'or';
  const mode  = localStorage.getItem('ar-mode')  || 'dark';
  const zoom  = localStorage.getItem('ar-zoom')  || 'md';
  setTheme(theme);
  setMode(mode);
  setZoom(zoom);
  renderCatalogue();
  renderPartiesSauvegardees();
})();
</script>
</body>
</html>
